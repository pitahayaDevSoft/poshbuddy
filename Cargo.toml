[package]
name = "poshbuddy"
version = "0.2.1-rust"
edition = "2021"
authors = ["julesklord"]
description = "The definitive TUI manager for Oh My Posh on Windows & PowerShell"
license = "MIT"
repository = "https://github.com/julesklord/poshbuddy"
homepage = "https://github.com/julesklord/poshbuddy"
keywords = ["terminal", "tui", "powershell", "oh-my-posh", "windows"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"

[dependencies]
ratatui = "0.26"
crossterm = { version = "0.27", features = ["event-stream"] }
reqwest = { version = "0.11", features = ["json"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dirs = "5.0"
futures = "0.3.32"
ansi-to-tui = "4.0.1"

[dev-dependencies]
mockito = "1.7.2"
tokio-test = "0.4"
tempfile = "3.8"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 0
debug = true
